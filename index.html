<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Examination Portal</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .exam-card {
      background: var(--card);
      width: 100%;
      max-width: 650px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 15px;
      margin-bottom: 20px;
    }

    .timer {
      font-weight: bold;
      color: #dc2626;
      background: #fee2e2;
      padding: 6px 12px;
      border-radius: 6px;
    }

    .question {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option-label {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .option-label:hover {
      background: #f1f5f9;
    }

    .option-label input {
      margin-right: 12px;
    }

    .footer {
      margin-top: 25px;
      display: flex;
      justify-content: space-between;
    }

    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="exam-card">
  <!-- START SCREEN -->
  <div id="start-screen">
    <h2>General Knowledge Examination</h2>
    <p><strong>Total Questions:</strong> <span id="total-q-count">0</span></p>
    <p><strong>Time Limit:</strong> 2 Minutes</p>
    <p>Ensure you do not refresh or switch tabs during the exam.</p>
    <button onclick="startExam()">Start Exam</button>
  </div>

  <!-- EXAM SCREEN -->
  <div id="exam-screen" class="hidden">
    <div class="header">
      <span id="question-number">Question 1</span>
      <div class="timer">Time Left: <span id="time-display">02:00</span></div>
    </div>

    <div class="question" id="question-text">Question goes here...</div>
    <div class="options" id="options-container"></div>

    <div class="footer">
      <button id="prev-btn" onclick="navigate(-1)" disabled>Previous</button>
      <button id="next-btn" onclick="navigate(1)">Next</button>
      <button id="submit-btn" class="hidden" onclick="submitExam()">Submit Exam</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="hidden">
    <h2>Examination Submitted!</h2>
    <p>Your Score: <strong id="score-text"></strong></p>
    <button onclick="location.reload()">Retake Exam</button>
  </div>
</div>

<script>
  const questions = [
    {
      text: "Which protocol is primarily used for secure web communication?",
      options: ["HTTP", "HTTPS", "FTP", "SMTP"],
      correct: 1
    },
    {
      text: "Which data structure operates on a First-In-First-Out (FIFO) basis?",
      options: ["Stack", "Array", "Queue", "Tree"],
      correct: 2
    },
    {
      text: "What does SQL stand for?",
      options: [
        "Structured Query Language",
        "Simple Query Logic",
        "Sequential Query Language",
        "System Query Level"
      ],
      correct: 0
    }
  ];

  let currentIdx = 0;
  let userAnswers = new Array(questions.length).fill(null);
  let timeLeft = 120; // 2 minutes in seconds
  let timerInterval = null;

  document.getElementById('total-q-count').innerText = questions.length;

  function startExam() {
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('exam-screen').classList.remove('hidden');
    renderQuestion();
    startTimer();
  }

  function renderQuestion() {
    const q = questions[currentIdx];
    document.getElementById('question-number').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
    document.getElementById('question-text').innerText = q.text;

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    q.options.forEach((opt, idx) => {
      const label = document.createElement('label');
      label.className = 'option-label';
      
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = 'option';
      radio.value = idx;
      if (userAnswers[currentIdx] === idx) radio.checked = true;

      radio.onchange = () => { userAnswers[currentIdx] = idx; };

      label.appendChild(radio);
      label.appendChild(document.createTextNode(opt));
      container.appendChild(label);
    });

    // Control buttons
    document.getElementById('prev-btn').disabled = (currentIdx === 0);
    if (currentIdx === questions.length - 1) {
      document.getElementById('next-btn').classList.add('hidden');
      document.getElementById('submit-btn').classList.remove('hidden');
    } else {
      document.getElementById('next-btn').classList.remove('hidden');
      document.getElementById('submit-btn').classList.add('hidden');
    }
  }

  function navigate(direction) {
    currentIdx += direction;
    renderQuestion();
  }

  function startTimer() {
    timerInterval = setInterval(() => {
      timeLeft--;
      const min = String(Math.floor(timeLeft / 60)).padStart(2, '0');
      const sec = String(timeLeft % 60).padStart(2, '0');
      document.getElementById('time-display').innerText = `${min}:${sec}`;

      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        submitExam();
      }
    }, 1000);
  }

  function submitExam() {
    clearInterval(timerInterval);
    let score = 0;
    questions.forEach((q, idx) => {
      if (userAnswers[idx] === q.correct) score++;
    });

    document.getElementById('exam-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    document.getElementById('score-text').innerText = `${score} / ${questions.length} (${Math.round((score/questions.length)*100)}%)`;
  }
</script>

</body>
</html>
